<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estática FC — Campaign Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0A0A0F;color:#E8E8F0;min-height:100vh}
.header{background:#12121A;border-bottom:1px solid #1E1E2E;padding:20px 32px;display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center;gap:14px}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,#FF6B35,#FFD700);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-name{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:3px;color:#FF6B35}
.logo-sub{font-size:11px;color:#555;letter-spacing:2px;text-transform:uppercase}
.container{padding:32px;max-width:1200px;margin:0 auto}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.kpi-card{background:#12121A;border:1px solid #1E1E2E;border-radius:14px;padding:20px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
.kpi-card.orange::before{background:#FF6B35}.kpi-card.green::before{background:#06D6A0}
.kpi-card.blue::before{background:#00B4D8}.kpi-card.yellow::before{background:#FFD166}
.kpi-icon{font-size:22px;margin-bottom:8px}
.kpi-value{font-family:'Bebas Neue',cursive;font-size:34px;line-height:1}
.kpi-card.orange .kpi-value{color:#FF6B35}.kpi-card.green .kpi-value{color:#06D6A0}
.kpi-card.blue .kpi-value{color:#00B4D8}.kpi-card.yellow .kpi-value{color:#FFD166}
.kpi-label{font-size:11px;color:#888;margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.kpi-sub{font-size:11px;color:#555;margin-top:3px}
.filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:8px 18px;border-radius:20px;border:1px solid #1E1E2E;background:transparent;color:#666;font-size:12px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;font-family:'DM Sans',sans-serif}
.filter-btn:hover,.filter-btn.active{border-color:#FF6B35;background:rgba(255,107,53,0.12);color:#FF6B35}
.main-grid{display:grid;gap:20px}
.main-grid.with-detail{grid-template-columns:1fr 360px}
.camp-list{display:flex;flex-direction:column;gap:12px}
.camp-card{background:#12121A;border:1px solid #1E1E2E;border-radius:14px;padding:20px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.camp-card:hover{border-color:#333}
.camp-card.selected{background:#16161F}
.camp-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.camp-name{font-weight:600;font-size:15px;margin-bottom:4px;color:#E8E8F0}
.camp-meta{font-size:12px;color:#888}
.status-tag{font-size:10px;padding:4px 10px;border-radius:20px;font-weight:600;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.status-active{background:rgba(6,214,160,0.15);color:#06D6A0}
.status-planning{background:rgba(255,209,102,0.15);color:#FFD166}
.status-completed{background:rgba(136,136,136,0.15);color:#888}
.budget-row{display:flex;justify-content:space-between;font-size:12px;color:#666;margin-bottom:6px}
.progress-track{background:#1E1E2E;border-radius:4px;height:4px}
.progress-fill{height:100%;border-radius:4px;transition:width 0.5s}
.camp-kpis{display:flex;gap:24px;margin-top:12px}
.kpi-mini-val{font-size:13px;font-weight:600}
.kpi-mini-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.detail-panel{background:#12121A;border:1px solid #1E1E2E;border-radius:16px;padding:24px;height:fit-content;position:sticky;top:20px}
.detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.detail-title{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px}
.close-btn{background:none;border:none;color:#555;cursor:pointer;font-size:22px;line-height:1}
.close-btn:hover{color:#E8E8F0}
.detail-name{font-weight:600;font-size:16px;margin-bottom:4px}
.detail-client{font-size:13px;color:#888;margin-bottom:20px}
.detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1E1E2E;font-size:13px}
.detail-row-label{color:#666}
.detail-row-val{font-weight:500}
.kpi-section-title{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px;margin:16px 0 10px}
.kpi-detail-row{display:flex;justify-content:space-between;padding:8px 12px;background:#0A0A0F;border-radius:8px;margin-bottom:6px;font-size:13px}
.kpi-detail-label{color:#888}
@media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.main-grid.with-detail{grid-template-columns:1fr}.container{padding:16px}}
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div><div class="logo-name">Estática FC</div><div class="logo-sub">Campaign Dashboard</div></div>
  </div>
  <div style="font-size:12px;color:#555;letter-spacing:1px">Temporada 2026</div>
</div>
<div class="container">
  <div class="kpi-grid">
    <div class="kpi-card orange"><div class="kpi-icon">💰</div><div class="kpi-value">S/ 69,500</div><div class="kpi-label">Presupuesto total</div><div class="kpi-sub">S/ 28,700 ejecutado</div></div>
    <div class="kpi-card green"><div class="kpi-icon">🚀</div><div class="kpi-value">2</div><div class="kpi-label">Campañas activas</div><div class="kpi-sub">de 5 campañas</div></div>
    <div class="kpi-card blue"><div class="kpi-icon">👁️</div><div class="kpi-value">282K</div><div class="kpi-label">Alcance total</div><div class="kpi-sub">personas impactadas</div></div>
    <div class="kpi-card yellow"><div class="kpi-icon">📊</div><div class="kpi-value">41%</div><div class="kpi-label">Ejecución</div><div class="kpi-sub">del presupuesto usado</div></div>
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-f="all">Todas</button>
    <button class="filter-btn" data-f="active">Activa</button>
    <button class="filter-btn" data-f="planning">Planificación</button>
    <button class="filter-btn" data-f="completed">Completada</button>
  </div>
  <div class="main-grid" id="main-grid">
    <div class="camp-list" id="camp-list"></div>
    <div class="detail-panel" id="detail-panel" style="display:none"></div>
  </div>
</div>
<script>
const campaigns=[
  {id:1,name:"Lanzamiento Camiseta Temporada",client:"Nike Perú",type:"OOH + Activación",status:"active",budget:15000,spent:9200,start:"01 Mar 2026",end:"15 Abr 2026",reach:45000,engagement:8.2,activations:3,color:"#FF6B35"},
  {id:2,name:"Patrocinio Copa Perú",client:"Inca Kola",type:"Patrocinio",status:"planning",budget:28000,spent:4500,start:"01 Abr 2026",end:"30 Jun 2026",reach:120000,engagement:5.4,activations:8,color:"#FFD700"},
  {id:3,name:"Activación Estadio Nacional",client:"Pilsen Callao",type:"Activación",status:"completed",budget:12000,spent:11800,start:"15 Ene 2026",end:"28 Feb 2026",reach:32000,engagement:11.7,activations:2,color:"#00B4D8"},
  {id:4,name:"Billboard Miraflores",client:"Adidas Perú",type:"OOH",status:"active",budget:8000,spent:3200,start:"10 Mar 2026",end:"31 Mar 2026",reach:67000,engagement:3.1,activations:1,color:"#7B2FBE"},
  {id:5,name:"Street Marketing San Isidro",client:"Gatorade",type:"Activación",status:"planning",budget:6500,spent:0,start:"20 Abr 2026",end:"05 May 2026",reach:18000,engagement:14.2,activations:5,color:"#06D6A0"}
];
const statusMap={active:{label:"Activa",cls:"status-active"},planning:{label:"Planificación",cls:"status-planning"},completed:{label:"Completada",cls:"status-completed"}};
let selectedId=null,currentFilter="all";
function pct(c){return Math.min(100,Math.round((c.spent/c.budget)*100))}
function renderList(){
  const list=document.getElementById("camp-list");
  const filtered=currentFilter==="all"?campaigns:campaigns.filter(c=>c.status===currentFilter);
  list.innerHTML=filtered.map(c=>{
    const st=statusMap[c.status],p=pct(c),isSel=selectedId===c.id;
    return`<div class="camp-card${isSel?' selected':''}" data-id="${c.id}" style="border-color:${isSel?c.color:'#1E1E2E'}">
      <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${c.color};border-radius:14px 0 0 14px"></div>
      <div class="camp-header">
        <div><div class="camp-name">${c.name}</div><div class="camp-meta">${c.client} · ${c.type}</div></div>
        <span class="status-tag ${st.cls}">${st.label}</span>
      </div>
      <div class="budget-row"><span>S/ ${c.spent.toLocaleString()} / S/ ${c.budget.toLocaleString()}</span><span style="color:${p>90?'#FF6B35':'#888'}">${p}%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${p}%;background:${p>90?'#FF6B35':c.color}"></div></div>
      <div class="camp-kpis">
        <div><div class="kpi-mini-val" style="color:${c.color}">${(c.reach/1000).toFixed(0)}K</div><div class="kpi-mini-label">Alcance</div></div>
        <div><div class="kpi-mini-val" style="color:${c.color}">${c.engagement}%</div><div class="kpi-mini-label">Engagement</div></div>
        <div><div class="kpi-mini-val" style="color:${c.color}">${c.activations}</div><div class="kpi-mini-label">Activaciones</div></div>
      </div></div>`;
  }).join("");
  list.querySelectorAll(".camp-card").forEach(el=>{
    el.addEventListener("click",()=>{
      const id=parseInt(el.dataset.id);
      selectedId=selectedId===id?null:id;
      renderList();renderDetail();
    });
  });
}
function renderDetail(){
  const panel=document.getElementById("detail-panel"),grid=document.getElementById("main-grid");
  if(!selectedId){panel.style.display="none";grid.classList.remove("with-detail");return}
  const c=campaigns.find(x=>x.id===selectedId);
  grid.classList.add("with-detail");panel.style.display="block";panel.style.borderColor=c.color+"60";
  panel.innerHTML=`
    <div class="detail-header"><div class="detail-title" style="color:${c.color}">Detalle</div><button class="close-btn" id="close-detail">×</button></div>
    <div class="detail-name">${c.name}</div><div class="detail-client">${c.client}</div>
    ${[["Tipo",c.type],["Inicio",c.start],["Fin",c.end],["Presupuesto","S/ "+c.budget.toLocaleString()],["Ejecutado","S/ "+c.spent.toLocaleString()],["Disponible","S/ "+(c.budget-c.spent).toLocaleString()]].map(([l,v])=>`<div class="detail-row"><span class="detail-row-label">${l}</span><span class="detail-row-val">${v}</span></div>`).join("")}
    <div class="kpi-section-title">KPIs</div>
    ${[["Alcance",c.reach.toLocaleString()+" personas"],["Engagement",c.engagement+"%"],["Activaciones",c.activations+" eventos"]].map(([l,v])=>`<div class="kpi-detail-row"><span class="kpi-detail-label">${l}</span><span style="color:${c.color};font-weight:600">${v}</span></div>`).join("")}`;
  document.getElementById("close-detail").addEventListener("click",()=>{selectedId=null;renderList();renderDetail()});
}
document.getElementById("filters").addEventListener("click",e=>{
  const btn=e.target.closest("[data-f]");if(!btn)return;
  currentFilter=btn.dataset.f;selectedId=null;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");renderList();renderDetail();
});
renderList();renderDetail();
</script>
</body>
</html>
