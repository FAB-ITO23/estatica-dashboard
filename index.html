<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Estática FC — Campaign Dashboard</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #efefed;
    --bg-info: #e8f0fb;
    --bg-success: #e6f4ee;
    --bg-warning: #fef8e7;
    --bg-danger: #fdecea;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #a0a0a0;
    --text-info: #1a56a0;
    --text-success: #0f6e56;
    --text-warning: #92400e;
    --text-danger: #b91c1c;
    --border-tertiary: rgba(0,0,0,0.1);
    --border-secondary: rgba(0,0,0,0.2);
    --border-info: #1a56a0;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #242424;
      --bg-tertiary: #2e2e2e;
      --bg-info: #0d2340;
      --bg-success: #0a2e20;
      --bg-warning: #2e1f00;
      --bg-danger: #2e0d0d;
      --text-primary: #f0f0f0;
      --text-secondary: #a0a0a0;
      --text-tertiary: #666666;
      --text-info: #7aaef0;
      --text-success: #5dcaa5;
      --text-warning: #f0c060;
      --text-danger: #f08080;
      --border-tertiary: rgba(255,255,255,0.1);
      --border-secondary: rgba(255,255,255,0.2);
      --border-info: #7aaef0;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; font-size: 14px; line-height: 1.5; }

  header { background: var(--bg-primary); border-bottom: 0.5px solid var(--border-tertiary); padding: 16px 28px; display: flex; justify-content: space-between; align-items: center; }
  .logo-icon { width: 34px; height: 34px; background: var(--bg-info); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .logo-name { font-size: 15px; font-weight: 500; color: var(--text-primary); }
  .logo-sub { font-size: 12px; color: var(--text-secondary); }

  main { padding: 24px 28px; max-width: 1080px; margin: 0 auto; }

  .metrics-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 22px; }
  .metric { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 14px 16px; }
  .metric-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
  .metric-value { font-size: 22px; font-weight: 500; color: var(--text-primary); }
  .metric-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }

  .filters { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-btn { background: transparent; border: 0.5px solid var(--border-tertiary); border-radius: 20px; padding: 6px 14px; font-size: 12px; cursor: pointer; color: var(--text-secondary); transition: all 0.15s; font-family: var(--font); }
  .filter-btn:hover { border-color: var(--border-secondary); color: var(--text-primary); }
  .filter-btn.sel { background: var(--bg-info); color: var(--text-info); border-color: var(--border-info); }

  .main-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
  .main-grid.with-detail { grid-template-columns: 1fr 320px; }

  .camp-list { display: flex; flex-direction: column; gap: 8px; }
  .camp-card { background: var(--bg-primary); border: 0.5px solid var(--border-tertiary); border-radius: var(--radius-lg); padding: 16px 18px; cursor: pointer; transition: border-color 0.15s; }
  .camp-card:hover { border-color: var(--border-secondary); }
  .camp-card.active { border: 1.5px solid var(--border-info); }

  .camp-name { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 3px; }
  .camp-meta { font-size: 12px; color: var(--text-secondary); }

  .tag { font-size: 11px; padding: 3px 9px; border-radius: var(--radius-md); font-weight: 500; white-space: nowrap; }
  .tag-active { background: var(--bg-success); color: var(--text-success); }
  .tag-planning { background: var(--bg-warning); color: var(--text-warning); }
  .tag-completed { background: var(--bg-secondary); color: var(--text-secondary); }

  .progress-track { height: 3px; border-radius: 3px; background: var(--border-tertiary); margin-top: 8px; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s; background: var(--bg-info); }
  .progress-fill.danger { background: var(--bg-danger); }

  .kpi-row { display: flex; gap: 20px; margin-top: 12px; }
  .kpi-val { font-size: 13px; font-weight: 500; color: var(--text-info); }
  .kpi-lbl { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1px; margin-top: 1px; }

  .detail-panel { background: var(--bg-primary); border: 0.5px solid var(--border-tertiary); border-radius: var(--radius-lg); padding: 18px; height: fit-content; position: sticky; top: 20px; }
  .detail-section-title { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1px; }
  .detail-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 0.5px solid var(--border-tertiary); font-size: 13px; }
  .detail-row:last-of-type { border-bottom: none; }
  .kpi-chip { display: flex; justify-content: space-between; padding: 8px 12px; background: var(--bg-secondary); border-radius: var(--radius-md); margin-bottom: 6px; font-size: 13px; }

  @media (max-width: 720px) {
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    .main-grid.with-detail { grid-template-columns: 1fr; }
    main { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:12px;">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-name">Estática FC</div>
      <div class="logo-sub">Campaign dashboard · Temporada 2026</div>
    </div>
  </div>
  <div style="font-size:12px; color:var(--text-tertiary);">Marketing</div>
</header>

<main>
  <div class="metrics-grid">
    <div class="metric"><div class="metric-label">Presupuesto total</div><div class="metric-value">S/ 69,500</div><div class="metric-sub">S/ 28,700 ejecutado</div></div>
    <div class="metric"><div class="metric-label">Campañas activas</div><div class="metric-value">2</div><div class="metric-sub">de 5 campañas</div></div>
    <div class="metric"><div class="metric-label">Alcance total</div><div class="metric-value">282K</div><div class="metric-sub">personas impactadas</div></div>
    <div class="metric"><div class="metric-label">Ejecución</div><div class="metric-value">41%</div><div class="metric-sub">del presupuesto usado</div></div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn sel" data-f="all">Todas</button>
    <button class="filter-btn" data-f="active">Activa</button>
    <button class="filter-btn" data-f="planning">Planificación</button>
    <button class="filter-btn" data-f="completed">Completada</button>
  </div>

  <div class="main-grid" id="main-grid">
    <div class="camp-list" id="camp-list"></div>
    <div id="detail-panel" style="display:none;"></div>
  </div>
</main>

<script>
const campaigns = [
  { id:1, name:"Lanzamiento Camiseta Temporada", client:"Nike Perú", type:"OOH + Activación", status:"active", budget:15000, spent:9200, start:"01 Mar 2026", end:"15 Abr 2026", reach:45000, engagement:8.2, activations:3 },
  { id:2, name:"Patrocinio Copa Perú", client:"Inca Kola", type:"Patrocinio", status:"planning", budget:28000, spent:4500, start:"01 Abr 2026", end:"30 Jun 2026", reach:120000, engagement:5.4, activations:8 },
  { id:3, name:"Activación Estadio Nacional", client:"Pilsen Callao", type:"Activación", status:"completed", budget:12000, spent:11800, start:"15 Ene 2026", end:"28 Feb 2026", reach:32000, engagement:11.7, activations:2 },
  { id:4, name:"Billboard Miraflores", client:"Adidas Perú", type:"OOH", status:"active", budget:8000, spent:3200, start:"10 Mar 2026", end:"31 Mar 2026", reach:67000, engagement:3.1, activations:1 },
  { id:5, name:"Street Marketing San Isidro", client:"Gatorade", type:"Activación", status:"planning", budget:6500, spent:0, start:"20 Abr 2026", end:"05 May 2026", reach:18000, engagement:14.2, activations:5 },
];
const statusMap = {
  active:    { label:"Activa",        cls:"tag-active" },
  planning:  { label:"Planificación", cls:"tag-planning" },
  completed: { label:"Completada",    cls:"tag-completed" },
};
let selectedId = null, currentFilter = "all";
function pct(c){ return Math.min(100, Math.round((c.spent/c.budget)*100)); }

function renderList(){
  const list = document.getElementById("camp-list");
  const filtered = currentFilter==="all" ? campaigns : campaigns.filter(c=>c.status===currentFilter);
  list.innerHTML = filtered.map(c=>{
    const st = statusMap[c.status]; const p = pct(c);
    return `<div class="camp-card ${selectedId===c.id?'active':''}" data-id="${c.id}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
        <div><div class="camp-name">${c.name}</div><div class="camp-meta">${c.client} · ${c.type}</div></div>
        <span class="tag ${st.cls}">${st.label}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-tertiary);margin-bottom:5px;">
        <span>S/ ${c.spent.toLocaleString()} / S/ ${c.budget.toLocaleString()}</span><span>${p}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill ${p>90?'danger':''}" style="width:${p}%"></div></div>
      <div class="kpi-row">
        <div><div class="kpi-val">${(c.reach/1000).toFixed(0)}K</div><div class="kpi-lbl">Alcance</div></div>
        <div><div class="kpi-val">${c.engagement}%</div><div class="kpi-lbl">Engagement</div></div>
        <div><div class="kpi-val">${c.activations}</div><div class="kpi-lbl">Activaciones</div></div>
      </div>
    </div>`;
  }).join("");
  list.querySelectorAll(".camp-card").forEach(el=>{
    el.addEventListener("click",()=>{ selectedId = selectedId===parseInt(el.dataset.id)?null:parseInt(el.dataset.id); renderList(); renderDetail(); });
  });
}

function renderDetail(){
  const panel = document.getElementById("detail-panel");
  const grid  = document.getElementById("main-grid");
  if(!selectedId){ panel.style.display="none"; grid.className="main-grid"; return; }
  const c = campaigns.find(x=>x.id===selectedId);
  grid.className="main-grid with-detail"; panel.style.display="block";
  panel.className="detail-panel";
  panel.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div class="detail-section-title">Detalle</div>
      <button id="close-btn" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-tertiary);line-height:1;">×</button>
    </div>
    <div style="font-size:15px;font-weight:500;color:var(--text-primary);margin-bottom:3px;">${c.name}</div>
    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">${c.client}</div>
    ${[["Tipo",c.type],["Inicio",c.start],["Fin",c.end],["Presupuesto","S/ "+c.budget.toLocaleString()],["Ejecutado","S/ "+c.spent.toLocaleString()],["Disponible","S/ "+(c.budget-c.spent).toLocaleString()]].map(([l,v])=>
      `<div class="detail-row"><span style="color:var(--text-secondary);">${l}</span><span style="font-weight:500;color:var(--text-primary);">${v}</span></div>`).join("")}
    <div style="font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:1px;margin:16px 0 10px;">KPIs</div>
    ${[["Alcance",c.reach.toLocaleString()+" personas"],["Engagement",c.engagement+"%"],["Activaciones",c.activations+" eventos"]].map(([l,v])=>
      `<div class="kpi-chip"><span style="color:var(--text-secondary);">${l}</span><span style="font-weight:500;color:var(--text-info);">${v}</span></div>`).join("")}
  `;
  document.getElementById("close-btn").addEventListener("click",()=>{ selectedId=null; renderList(); renderDetail(); });
}

document.getElementById("filters").addEventListener("click",e=>{
  const btn=e.target.closest("[data-f]"); if(!btn) return;
  currentFilter=btn.dataset.f; selectedId=null;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("sel"));
  btn.classList.add("sel"); renderList(); renderDetail();
});

renderList(); renderDetail();
</script>
</body>
</html>
